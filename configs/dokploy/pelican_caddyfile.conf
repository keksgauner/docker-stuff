{
	servers {
		## docs https://caddyserver.com/docs/caddyfile/options#trusted-proxies
		#{$CADDY_TRUSTED_PROXIES} 
		#{$CADDY_STRICT_PROXIES}
        trusted_proxies static {$CADDY_TRUSTED_PROXIES_C}
	}

	admin off
	auto_https off
	#email {$ADMIN_EMAIL}
}

:80 {
	root * /var/www/html/public
	encode gzip

    request_body {
        max_size 1024MB
    }

	php_fastcgi 127.0.0.1:9000 {
        env PHP_VALUE "upload_max_filesize = 1024M
                    	post_max_size = 1024M"
    }

	file_server
}