x-common:
  database: &db-environment
    # Do not remove the "&db-password" from the end of the line below, it is important
    # for Panel functionality.
    MYSQL_PASSWORD: &db-password ${MYSQL_PASSWORD:-secret_user_password}
    MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret_root_password}
  panel: &panel-environment
    APP_URL: "http://localhost"
    # A list of valid timezones can be found here: http://php.net/manual/en/timezones.php
    APP_TIMEZONE: "UTC"
    APP_SERVICE_AUTHOR: "noreply@example.com"
    # Uncomment the line below and set to a non-empty value if you want to use Let's Encrypt
    # to generate an SSL certificate for the Panel.
    # LE_EMAIL: ""
  mail: &mail-environment
    MAIL_FROM: "noreply@example.com"
    MAIL_DRIVER: "smtp"
    MAIL_HOST: "mail"
    MAIL_PORT: "1025"
    MAIL_USERNAME: ""
    MAIL_PASSWORD: ""
    MAIL_ENCRYPTION: "true"

#
# ------------------------------------------------------------------------------------------
# DANGER ZONE BELOW
#
# The remainder of this file likely does not need to be changed. Please only make modifications
# below if you understand what you are doing.
#
services:
  database:
    image: mariadb:latest
    restart: always
    container_name: pterodactyl_mariadb
    volumes:
      - pterodactyl_database:/var/lib/mysql
    environment:
      <<: *db-environment
      MYSQL_DATABASE: panel
      MYSQL_USER: pterodactyl
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 20s
      retries: 3

  cache:
    image: redis:alpine
    restart: always
    container_name: pterodactyl_redis
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  panel:
    image: ghcr.io/pterodactyl/panel:latest
    restart: always
    container_name: pterodactyl_panel
    ports:
      - 80:80
      - 443:443
    environment:
      <<: [*panel-environment, *mail-environment]
      DB_PASSWORD: *db-password
      APP_ENV: production
      APP_ENVIRONMENT_ONLY: false
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_DRIVER: redis
      REDIS_HOST: cache
      DB_CONNECTION: mariadb
      DB_HOST: database
      DB_PORT: 3306
      TRUSTED_PROXIES: ${TRUSTED_PROXIES}
    env_file:
      - .env
    volumes:
      - pterodactyl_var:/app/var
      - pterodactyl_nginx:/etc/nginx/http.d/
      - pterodactyl_logs:/app/storage/logs
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  wings:
    image: ghcr.io/pterodactyl/wings:latest
    restart: always
    container_name: pterodactyl_wings
    ports:
      - 8080:8080
      - 2022:2022
    tty: true
    environment:
      TZ: "UTC"
      WINGS_UID: 988
      WINGS_GID: 988
      WINGS_USERNAME: pterodactyl
    env_file:
      - .env
    volumes:
      - wings_config:/etc/pterodactyl/
      - wings_logs:/var/log/pterodactyl/
      - wings_data:/var/lib/pterodactyl/
      # The following mounts are required for Wings to function properly.
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers/:/var/lib/docker/containers/
      - /tmp/pterodactyl/:/tmp/pterodactyl/
      #- /etc/ssl/certs:/etc/ssl/certs:ro
      # you may need /srv/daemon-data if you are upgrading from an old daemon
      #- /srv/daemon-data/:/srv/daemon-data/
      # Required for ssl if you use let's encrypt. uncomment to use.
      #- /etc/letsencrypt/:/etc/letsencrypt/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pterodactyl_database:
  pterodactyl_var:
  pterodactyl_nginx:
  pterodactyl_logs:
  wings_config:
  wings_logs:
  wings_data:
