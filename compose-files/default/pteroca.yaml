name: pteroca
services:
  database:
    image: mariadb:latest
    restart: always
    container_name: pteroca_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret_root_password}
      MYSQL_DATABASE: panel
      MYSQL_USER: pteroca
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret_user_password}
    env_file:
      - .env
    volumes:
      - pteroca_database:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Not for prod
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pteroca_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
      # Increase upload limits for database imports
      UPLOAD_LIMIT: 128M
      MAX_EXECUTION_TIME: 300
      MEMORY_LIMIT: 512M
      depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  panel:
    build:
      context: .
      args:
        APP_ENV: prod
    restart: always
    container_name: pteroca_panel
    ports:
      - 80:80
    environment:
      DATABASE_URL: ${DATABASE_URL:-mariadb://pteroca:${MYSQL_PASSWORD:-secret_user_password}@database:3306/panel}
      APP_ENV: prod
      CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    env_file:
      - .env
    volumes:
      # Live source code sync - changes on host immediately visible in container
      - pteroca_src:/app/src
      - pteroca_themes:/app/themes
      - pteroca_config:/app/config
      - pteroca_migrations:/app/migrations
      - pteroca_plugins:/app/plugins
      - pteroca_public:/app/public
      - pteroca_tests:/app/tests
      # Persistent data volumes
      - pteroca_var:/app/var
      - pteroca_uploads:/app/public/uploads
      - .env:/app/.env
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    working_dir: /app
    command: >
      sh -c "
        echo 'Waiting for database to be ready...'
        until php bin/console doctrine:query:sql 'SELECT 1' > /dev/null 2>&1; do
          echo 'Database not ready yet, waiting...'
          sleep 2
        done
        echo 'Database is ready, installing assets...'
        php bin/console assets:install public --symlink --relative
        echo 'Running migrations...'
        php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
        echo 'Migrations completed successfully!'
        echo 'Setting up permissions...'
        mkdir -p /app/var/log /app/var/cache /app/public/uploads
        chown -R www-data:www-data /app/var /app/public/uploads
        chmod -R 775 /app/var /app/public/uploads
        echo 'Starting PHP development server with router script...'
        php -S 0.0.0.0:8000 -t public/ public/router.php
      "
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pteroca_database:
  pteroca_var:
  pteroca_uploads:
  pteroca_src:
  pteroca_themes:
  pteroca_config:
  pteroca_migrations:
  pteroca_plugins:
  pteroca_tests:
