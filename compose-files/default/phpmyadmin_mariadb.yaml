services:
  mariadb:
    image: mariadb:latest
    restart: always
    container_name: mariadb
    ports:
      - 3306:3306
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-secret_root_password}
      MARIADB_USER: ${MARIADB_USER:-db_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-secret_user_password}
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 20s
      retries: 3

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    container_name: phpmyadmin
    ports:
      - 80:80
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mariadb_data:
